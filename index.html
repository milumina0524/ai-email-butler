<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samsung Galaxy AI | Smart Butler Pro</title>
    <style>
        :root {
            --samsung-blue: #1428a0;
            --accent-blue: #38bdf8;
            --bg: #000;
            --card-bg: rgba(28, 28, 30, 0.85);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1e3a8a 0%, #000 75%);
            color: #fff;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            margin: 0; padding: 24px; display: flex; justify-content: center; min-height: 100vh;
        }

        .app-container { width: 100%; max-width: 480px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; }
        .logo { font-weight: 800; font-size: 22px; background: linear-gradient(90deg, #fff, var(--accent-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .badge { font-size: 10px; background: rgba(56, 189, 248, 0.15); color: var(--accent-blue); padding: 5px 12px; border-radius: 20px; font-weight: 800; }

        /* Input Experience */
        .input-area { background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 28px; padding: 24px; margin-bottom: 24px; }
        textarea { width: 100%; height: 130px; background: transparent; border: none; color: #fff; font-size: 16px; line-height: 1.6; outline: none; resize: none; }
        
        button {
            width: 100%; padding: 18px; background: #fff; color: #000; border: none; border-radius: 50px; 
            font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        button:active { transform: scale(0.96); }

        /* Results List */
        #analysis-list { margin-top: 30px; }
        .email-card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 28px; padding: 28px; margin-bottom: 20px;
            backdrop-filter: blur(40px); animation: fadeInUp 0.6s ease; position: relative; overflow: hidden;
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .prio { position: absolute; top: 25px; right: 28px; font-size: 10px; font-weight: 900; padding: 4px 12px; border-radius: 20px; letter-spacing: 0.5px; }
        .urgent { background: #ff453a; color: #fff; box-shadow: 0 0 15px rgba(255, 69, 58, 0.3); }
        .normal { background: rgba(255,255,255,0.1); color: #fff; }

        .row { margin-bottom: 20px; }
        .row:last-child { margin-bottom: 0; }
        .label { font-size: 11px; color: var(--accent-blue); font-weight: 800; letter-spacing: 1px; margin-bottom: 6px; display: block; }
        .content { font-size: 17px; color: #f1f5f9; font-weight: 600; line-height: 1.4; }
        
        .empty { text-align: center; color: #444; margin-top: 60px; font-size: 14px; font-weight: 500; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="logo">GALAXY AI</div>
        <div class="badge">PRO BUTLER v4.0</div>
    </div>

    <div class="input-area">
        <textarea id="emailInput" placeholder="請輸入或貼入郵件本文..."></textarea>
        <button onclick="smartAnalyze()">
            <span>智慧摘要分析</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
        </button>
    </div>

    <div id="analysis-list">
        <div class="empty">等待輸入郵件內容進行解析...</div>
    </div>
</div>

<script>
    function smartAnalyze() {
        const text = document.getElementById('emailInput').value.trim();
        if (!text) return;

        document.querySelector('.empty').style.display = 'none';

        // --- AI 智慧擷取引擎 ---

        // 1. 緊急度 (P0 Keywords)
        const isUrgent = /緊急|變更|取消|截止|立刻|馬上|修改|重要通知/.test(text);

        // 2. 智慧摘要 (提取核心動詞與名詞)
        const titleMatch = text.match(/「(.+?)」/);
        let summary = "";
        if (titleMatch) {
            summary = `關於【${titleMatch[1]}】之活動通知。`;
        } else {
            summary = text.split(/[。！]/)[0].substring(0, 30) + "...";
        }
        // 過濾寒暄詞
        summary = summary.replace(/春暖花開|誠摯邀請|正式揭開序幕|共襄盛舉|沉浸於/g, "").trim();

        // 3. 時間偵測
        const timeMatch = text.match(/(\d{1,2}月\d{1,2}日|\d{1,2}:\d{2}|下週.|明天|下午.點|上午.點)/g);
        const timeResult = timeMatch ? timeMatch.join('、') : null;

        // 4. 地點偵測 (優化後的 Regex)
        const locMatch = text.match(/(在|於|地點:|地點在)(.+?)(大樓|廳|室|館|校區|飯店|辦公室|廣場)/);
        const locResult = locMatch ? locMatch[2] + locMatch[3] : null;

        // 5. 行動指南
        let action = "建議查閱全文了解細節。";
        if (text.includes("附件")) action = "💡 請務必下載並查看郵件附件。";
        if (text.includes("回覆") || text.includes("報名")) action = "⚠️ 需在期限內完成回覆或報名手續。";
        if (isUrgent) action = "🚨 偵測到重大變更，請立即優先處理。";

        // --- 渲染 UI ---

        const list = document.getElementById('analysis-list');
        const card = document.createElement('div');
        card.className = 'email-card';

        // 動態組合 HTML 內容 (如果沒有地點就不顯示該 Row)
        let rowsHtml = `
            <div class="row">
                <span class="label">AI SUMMARY</span>
                <span class="content">${summary}</span>
            </div>
        `;

        if (timeResult) {
            rowsHtml += `
                <div class="row">
                    <span class="label">TIME</span>
                    <span class="content">${timeResult}</span>
                </div>
            `;
        }

        if (locResult) {
            rowsHtml += `
                <div class="row">
                    <span class="label">LOCATION</span>
                    <span class="content">${locResult}</span>
                </div>
            `;
        }

        rowsHtml += `
            <div class="row">
                <span class="label">ACTION</span>
                <span class="content">${action}</span>
            </div>
        `;

        card.innerHTML = `
            <div class="prio ${isUrgent ? 'urgent' : 'normal'}">${isUrgent ? 'URGENT' : 'INFO'}</div>
            ${rowsHtml}
        `;

        list.insertBefore(card, list.firstChild);
        document.getElementById('emailInput').value = '';
        if (navigator.vibrate) navigator.vibrate(isUrgent ? [100, 50, 100] : [40]);
    }
</script>
</body>
</html>
