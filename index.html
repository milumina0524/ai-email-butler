<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>萬能郵件管家 | Gemini AI Powered</title>
    <style>
        :root {
            --samsung-blue: #1428a0;
            --accent: #38bdf8;
            --bg: #000;
            --card: rgba(28, 28, 35, 0.9);
            --border: rgba(255, 255, 255, 0.15);
        }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1e3a8a 0%, #000 85%);
            color: #fff;
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh;
        }

        .container { width: 100%; max-width: 480px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo { font-weight: 800; font-size: 24px; color: #fff; letter-spacing: -1px; }
        .ai-status { font-size: 10px; background: rgba(56, 189, 248, 0.15); color: var(--accent); padding: 5px 12px; border-radius: 20px; font-weight: 800; border: 1px solid var(--accent); }

        .input-section { background: var(--card); backdrop-filter: blur(25px); border: 1px solid var(--border); border-radius: 28px; padding: 20px; margin-bottom: 24px; }
        textarea { width: 100%; height: 130px; background: transparent; border: none; color: #fff; font-size: 16px; line-height: 1.6; outline: none; resize: none; margin-bottom: 10px; }
        
        button { width: 100%; padding: 18px; background: #fff; color: #000; border: none; border-radius: 50px; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        button:active { transform: scale(0.96); }

        #loader { display: none; text-align: center; margin: 20px 0; color: var(--accent); font-size: 14px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        .result-card { background: var(--card); border: 1px solid var(--border); border-radius: 32px; padding: 28px; margin-bottom: 20px; animation: slideUp 0.6s ease; position: relative; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        .label { font-size: 11px; color: var(--accent); font-weight: 800; letter-spacing: 1.5px; margin-bottom: 8px; display: block; text-transform: uppercase; }
        .content { font-size: 16px; color: #f1f5f9; font-weight: 500; line-height: 1.7; white-space: pre-wrap; }
        .prio-badge { position: absolute; top: 25px; right: 28px; font-size: 10px; font-weight: 900; padding: 4px 12px; border-radius: 20px; }
        .urgent { background: #ff453a; color: #fff; }
        .normal { background: rgba(255,255,255,0.1); color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">萬能郵件管家</div>
        <div class="ai-status">TRUE AI ACTIVE</div>
    </div>

    <div class="input-section">
        <textarea id="emailInput" placeholder="在此輸入或貼入郵件本文內容..."></textarea>
        <button onclick="askGemini()">
            啟動 Gemini AI 分析
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
        </button>
    </div>

    <div id="loader">✨ Gemini 正在進行深度語義解析...</div>
    <div id="display-list"></div>
</div>

<script>
    async function askGemini() {
        const text = document.getElementById('emailInput').value.trim();
        if (!text) return;

        const loader = document.getElementById('loader');
        const list = document.getElementById('display-list');
        loader.style.display = 'block';

        // 這裡就是妳的真 AI 金鑰
        const apiKey = "AIzaSyAqOqMHTi019bey7R0R07dgDgTsUX1raiI";
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

        // 向 AI 描述任務
        const prompt = `你是一位專業的萬能郵件管家。請根據以下郵件內容，產出結構化的繁體中文分析：
        1. [緊急程度]: 判斷是"緊急"或"普通"。
        2. [深度摘要]: 請以自然、親切的助手口吻，寫出約 80 字的摘要，抓出核心重點。
        3. [關鍵時地]: 抓出明確的時間與地點 (若無則跳過)。
        4. [行動指南]: 建議收件人下一步該做什麼。
        
        郵件內容：${text}`;

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await response.json();
            const aiResult = data.candidates[0].content.parts[0].text;
            
            // 簡單判斷緊急度顏色
            const isUrgent = aiResult.includes("緊急") || /變更|取消|立刻/.test(text);

            loader.style.display = 'none';
            const card = document.createElement('div');
            card.className = 'result-card';
            card.innerHTML = `
                <div class="prio-badge ${isUrgent ? 'urgent' : 'normal'}">${isUrgent ? 'URGENT' : 'INFO'}</div>
                <div class="row">
                    <span class="label">Gemini AI 智慧分析結果</span>
                    <div class="content">${aiResult}</div>
                </div>
            `;
            list.insertBefore(card, list.firstChild);
            document.getElementById('emailInput').value = '';
            if (navigator.vibrate) navigator.vibrate(isUrgent ? [80, 40, 80] : [40]);

        } catch (error) {
            loader.style.display = 'none';
            alert("AI 呼叫失敗。可能是金鑰被停用或是網路問題。");
            console.error(error);
        }
    }
</script>
</body>
</html>
