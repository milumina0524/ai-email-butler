<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>萬能郵件管家 | 診斷修復版</title>
    <style>
        :root { --accent: #38bdf8; --bg: #000; --card: rgba(30, 30, 35, 0.95); }
        body { background: var(--bg); background-image: radial-gradient(circle at 50% -20%, #1e3a8a 0%, #000 85%); color: #fff; font-family: system-ui, sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 480px; }
        .config-card { background: rgba(56, 189, 248, 0.1); border: 1px dashed var(--accent); border-radius: 20px; padding: 15px; margin-bottom: 20px; }
        .input-section { background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; padding: 24px; margin-bottom: 20px; }
        textarea { width: 100%; height: 120px; background: transparent; border: none; color: #fff; font-size: 16px; outline: none; resize: none; }
        button { width: 100%; padding: 18px; background: #fff; color: #000; border: none; border-radius: 50px; font-weight: 700; cursor: pointer; }
        .status-log { font-size: 12px; color: #666; margin-top: 10px; text-align: center; }
        .result-card { background: var(--card); border: 1px solid var(--accent); border-radius: 25px; padding: 20px; margin-top: 20px; animation: slideIn 0.5s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; letter-spacing:-1px;">萬能郵件管家</h2>
    
    <div class="config-card" id="config-ui">
        <input type="password" id="apiKeyInput" style="width:70%; background:transparent; border:none; color:#fff; outline:none;" placeholder="輸入您的新 API Key...">
        <button style="width:25%; padding:5px; font-size:12px; display:inline;" onclick="saveKey()">啟動</button>
    </div>

    <div class="input-section">
        <textarea id="emailInput" placeholder="在此貼入郵件內容..."></textarea>
        <button onclick="smartAnalyze()">AI 深度解析</button>
        <div id="log" class="status-log">系統就緒</div>
    </div>

    <div id="display"></div>
</div>

<script>
    let savedKey = sessionStorage.getItem('gemini_key');
    if (savedKey) document.getElementById('config-ui').style.display = 'none';

    function saveKey() {
        const key = document.getElementById('apiKeyInput').value.trim();
        if (key) {
            sessionStorage.setItem('gemini_key', key);
            savedKey = key;
            location.reload();
        }
    }

    async function smartAnalyze() {
        if (!savedKey) return alert('請先輸入 API Key！');
        const text = document.getElementById('emailInput').value.trim();
        if (!text) return;

        const log = document.getElementById('log');
        const display = document.getElementById('display');
        log.innerText = "正在嘗試連線至 Google AI 伺服器...";
        display.innerHTML = "";

        // 定義嘗試順序：Flash -> Pro -> Flash-Latest
        const models = ['gemini-1.5-flash', 'gemini-1.5-pro', 'gemini-1.5-flash-latest'];
        let success = false;

        for (let modelName of models) {
            if (success) break;
            log.innerText = `正在嘗試模型: ${modelName}...`;

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${savedKey}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `你是一位郵件管家，請用繁體中文摘要這封信的重點、時間、地點與行動建議：${text}` }] }]
                    })
                });

                const data = await response.json();

                if (data.candidates && data.candidates[0]) {
                    const aiText = data.candidates[0].content.parts[0].text;
                    display.innerHTML = `<div class="result-card"><b>AI 摘要結果 (${modelName}):</b><br><br>${aiText.replace(/\n/g, '<br>')}</div>`;
                    log.innerText = "解析成功！";
                    success = true;
                } else if (data.error) {
                    console.warn(`模型 ${modelName} 失敗:`, data.error.message);
                }
            } catch (err) {
                console.error(err);
            }
        }

        if (!success) {
            log.innerText = "所有模型皆無法連線。";
            alert("錯誤：所有 AI 模型路徑皆失效。請檢查 API Key 是否為『個人個人 @gmail 帳號』申請，且確保沒有區域限制。");
        }
    }
</script>
</body>
</html>
