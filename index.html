<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samsung AI Butler</title>
    <style>
        :root { --samsung-blue: #1428a0; --bg: #000; --card: #1c1c1e; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 20px; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; }
        .header { border-bottom: 2px solid var(--samsung-blue); padding-bottom: 10px; margin-bottom: 20px; }
        textarea { width: 100%; height: 150px; background: #2c2c2e; color: #fff; border: 1px solid #3a3a3c; border-radius: 12px; padding: 12px; box-sizing: border-box; font-size: 16px; margin-bottom: 15px; }
        button { width: 100%; padding: 15px; background: var(--samsung-blue); color: white; border: none; border-radius: 50px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        #result { margin-top: 25px; display: none; }
        .tag { display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 12px; margin-bottom: 10px; font-weight: bold; }
        .urgent { background: #ff453a; color: #fff; }
        .normal { background: #32d74b; color: #000; }
        .summary-card { background: var(--card); padding: 20px; border-radius: 15px; border-left: 5px solid var(--samsung-blue); }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h2>AI 萬能郵件管家</h2></div>
    <textarea id="input" placeholder="貼入長篇郵件..."></textarea>
    <button onclick="run()">執行 AI 智慧分析</button>
    <div id="result">
        <div id="badge" class="tag"></div>
        <div class="summary-card">
            <h3 style="margin-top:0; font-size:14px; color:var(--samsung-blue);">AI 50字摘要</h3>
            <p id="summary" style="line-height:1.6; margin:0; font-size:15px;"></p>
        </div>
    </div>
</div>
<script>
    function run() {
        const text = document.getElementById('input').value;
        if (!text) return;
        const keys = ['緊急', '變更', '立刻', '截止', '取消', '重要'];
        const isHigh = keys.some(k => text.includes(k));
        document.getElementById('badge').innerText = isHigh ? "緊急程度：高" : "優先級：普通";
        document.getElementById('badge').className = isHigh ? "tag urgent" : "tag normal";
        let clean = text.replace(/\s+/g, '');
        document.getElementById('summary').innerText = clean.substring(0, 50) + (clean.length > 50 ? "..." : "");
        document.getElementById('result').style.display = 'block';
        alert('🔔 AI 管家：已完成分析並推送摘要！');
    }
</script>
</body>
</html>
