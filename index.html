<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>萬能郵件管家 | Samsung Galaxy AI</title>
    <style>
        :root {
            --samsung-blue: #1428a0;
            --accent-cyan: #38bdf8;
            --bg: #000;
            --card-bg: rgba(30, 30, 35, 0.9);
            --border: rgba(255, 255, 255, 0.15);
        }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1e3a8a 0%, #000 80%);
            color: #fff;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            margin: 0; padding: 24px; display: flex; justify-content: center; min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container { width: 100%; max-width: 500px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo { font-weight: 800; font-size: 24px; letter-spacing: -1px; color: #fff; }
        .ai-status { font-size: 10px; background: rgba(56, 189, 248, 0.15); color: var(--accent-cyan); padding: 5px 12px; border-radius: 20px; font-weight: 800; }

        .input-card { background: var(--card-bg); backdrop-filter: blur(25px); border: 1px solid var(--border); border-radius: 28px; padding: 24px; margin-bottom: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        textarea { width: 100%; height: 140px; background: transparent; border: none; color: #fff; font-size: 16px; line-height: 1.6; outline: none; resize: none; margin-bottom: 15px; }
        
        button {
            width: 100%; padding: 18px; background: #fff; color: #000; border: none; border-radius: 50px; 
            font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        button:active { transform: scale(0.95); }

        #analysis-list { margin-top: 30px; }
        .email-card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 32px; padding: 30px; margin-bottom: 24px;
            backdrop-filter: blur(40px); animation: slideIn 0.6s ease forwards; position: relative;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        .prio-badge { position: absolute; top: 25px; right: 30px; font-size: 10px; font-weight: 900; padding: 5px 14px; border-radius: 20px; letter-spacing: 1px; }
        .urgent { background: #ff453a; color: #fff; }
        .normal { background: rgba(255,255,255,0.1); color: #fff; }

        .row { margin-bottom: 20px; }
        .row:last-child { margin-bottom: 0; }
        .label { font-size: 11px; color: var(--accent-cyan); font-weight: 800; letter-spacing: 1.5px; margin-bottom: 6px; display: block; text-transform: uppercase; }
        .content { font-size: 16px; color: #f1f5f9; font-weight: 500; line-height: 1.7; }
        
        .empty-hint { text-align: center; color: #444; margin-top: 60px; font-size: 14px; font-weight: 500; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="logo">萬能郵件管家</div>
        <div class="ai-status">GALAXY AI ENGINE</div>
    </div>

    <div class="input-card">
        <textarea id="emailInput" placeholder="請將郵件本文內容貼入於此..."></textarea>
        <button onclick="smartAnalyze()">
            <span>啟動智慧分析</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
        </button>
    </div>

    <div id="analysis-list">
        <div class="empty-hint">尚無處理紀錄，等待輸入中...</div>
    </div>
</div>

<script>
    function smartAnalyze() {
        const text = document.getElementById('emailInput').value.trim();
        if (!text) return;

        document.querySelector('.empty-hint').style.display = 'none';

        // 1. 偵測緊急程度
        const isUrgent = /緊急|變更|取消|截止|立刻|馬上|修改|重要通知|複試|面試|注意/.test(text);

        // 2. 智慧詳細摘要
        const titleMatch = text.match(/「(.+?)」/);
        const eventTitle = titleMatch ? `【${titleMatch[1]}】` : "此封郵件通知之事項";
        let mainBody = text.replace(/春暖花開|誠摯邀請|正式揭開序幕|共襄盛舉|沉浸於|創意與熱情交織的/g, "").trim();
        let keySentence = mainBody.split(/[。！]/).find(s => s.length > 10) || "相關活動與執行細節";
        
        const longSummary = `本郵件主要旨在告知有關${eventTitle}的相關安排與重點。AI 偵測到核心內容為：${keySentence}。建議收件人依照此摘要資訊預先進行準備，並留意後續相關通知。`;

        // 3. 關鍵資訊偵測 (時間/地點)
        const timeMatch = text.match(/(\d{1,2}月\d{1,2}日|\d{1,2}:\d{2}|下週.|明天|下午.點|上午.點)/g);
        const timeVal = timeMatch ? Array.from(new Set(timeMatch)).join('、') : null;

        const locMatch = text.match(/(在|於|地點:|地點在)(.+?)(大樓|廳|室|館|校區|飯店|辦公室|廣場|大廳|禮堂)/);
        const locVal = locMatch ? locMatch[2] + locMatch[3] : null;

        // 4. 建議行動
        let actionMsg = "建議詳閱全文以獲取完整資訊。";
        if (text.includes("附件")) actionMsg = "💡 系統偵測到附件，請務必開啟並查閱詳細圖表或文件。";
        if (text.includes("回覆") || text.includes("報名")) actionMsg = "⚠️ 此事項涉及後續流程，請於限期內完成回覆或報名手續。";
        if (isUrgent) actionMsg = "🚨 偵測到重大時程變更或緊急通知，請立即優先處理此郵件。";

        // --- 渲染 UI ---
        const list = document.getElementById('analysis-list');
        const card = document.createElement('div');
        card.className = 'email-card';

        let contentHtml = `
            <div class="row">
                <span class="label">AI 深度摘要</span>
                <span class="content">${longSummary}</span>
            </div>
        `;

        // 動態顯示：只有偵測到才列出
        if (timeVal) {
            contentHtml += `<div class="row"><span class="label">關鍵時間點</span><span class="content">${timeVal}</span></div>`;
        }
        if (locVal) {
            contentHtml += `<div class="row"><span class="label">活動地點</span><span class="content">${locVal}</span></div>`;
        }

        contentHtml += `
            <div class="row">
                <span class="label">建議行動指南</span>
                <span class="content">${actionMsg}</span>
            </div>
        `;

        card.innerHTML = `<div class="prio-badge ${isUrgent ? 'urgent' : 'normal'}">${isUrgent ? 'URGENT' : 'INFO'}</div>${contentHtml}`;
        list.insertBefore(card, list.firstChild);
        document.getElementById('emailInput').value = '';
        if (navigator.vibrate) navigator.vibrate(isUrgent ? [80, 40, 80] : [40]);
    }
</script>
</body>
</html>
