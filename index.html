<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samsung Galaxy AI | Universal Butler</title>
    <style>
        :root {
            --samsung-blue: #1428a0;
            --accent-cyan: #38bdf8;
            --bg: #000;
            --card-bg: rgba(28, 28, 30, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1e3a8a 0%, #000 70%);
            color: #fff;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container { width: 100%; max-width: 500px; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo { font-weight: 800; font-size: 20px; background: linear-gradient(90deg, #fff, var(--accent-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .ai-label { font-size: 10px; background: rgba(56, 189, 248, 0.15); color: var(--accent-cyan); padding: 4px 10px; border-radius: 20px; font-weight: 700; }

        .input-box {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        textarea {
            width: 100%; height: 120px; background: transparent; border: none; color: #fff;
            font-size: 16px; line-height: 1.6; outline: none; resize: none;
        }

        .btn-main {
            width: 100%; padding: 16px; background: #fff; color: #000; border: none;
            border-radius: 50px; font-weight: 700; font-size: 16px; cursor: pointer;
            transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .btn-main:active { transform: scale(0.97); }

        /* 分析列表 */
        .results-header { margin-top: 40px; font-size: 14px; color: var(--accent-cyan); font-weight: 700; display: none; }
        #analysis-list { margin-top: 15px; }

        .email-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            backdrop-filter: blur(30px);
            animation: slideIn 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            position: relative;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .urgency-tag { position: absolute; top: 20px; right: 24px; font-size: 10px; font-weight: 800; padding: 4px 12px; border-radius: 20px; }
        .tag-urgent { background: rgba(255, 69, 58, 0.2); color: #ff453a; border: 1px solid #ff453a; }
        .tag-normal { background: rgba(50, 215, 75, 0.2); color: #32d74b; border: 1px solid #32d74b; }

        .info-row { margin-bottom: 12px; }
        .info-row b { font-size: 11px; color: var(--accent-cyan); display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
        .info-row span { font-size: 15px; color: #e2e8f0; line-height: 1.5; font-weight: 500; }

        .empty-state { text-align: center; color: #444; margin-top: 50px; font-size: 14px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="logo">GALAXY AI Butler</div>
        <div class="ai-label">MULTI-MAIL ANALYSIS</div>
    </div>

    <div class="input-box">
        <textarea id="emailInput" placeholder="請貼入郵件本文內容..."></textarea>
        <button class="btn-main" onclick="analyzeMail()">
            分析此郵件
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
        </button>
    </div>

    <div id="results-title" class="results-header">已處理的 AI 摘要清單</div>
    <div id="analysis-list">
        <div class="empty-state">尚無分析紀錄，請在上方貼入內容</div>
    </div>
</div>

<script>
    function analyzeMail() {
        const text = document.getElementById('emailInput').value.trim();
        if (!text) return;

        // 移除空狀態文字
        document.querySelector('.empty-state').style.display = 'none';
        document.getElementById('results-title').style.display = 'block';

        // --- AI 邏輯開始 ---

        // 1. 判定緊急程度
        const isUrgent = /緊急|變更|取消|截止|注意|立刻|馬上|修改/.test(text);
        
        // 2. 提取時間 (Regex 尋找時間格式)
        const timeMatch = text.match(/(\d{1,2}月\d{1,2}日|\d{1,2}:\d{2}|下週[一二三四五六日]|明天|下午\d點|上午\d點)/g);
        const time = timeMatch ? timeMatch.join('、') : "未偵測到具體時間";

        // 3. 提取地點
        const locMatch = text.match(/(在|於|地點:|地點在)(.+?)(大樓|廳|室|館|校區|飯店|辦公室)/);
        const location = locMatch ? locMatch[2] + locMatch[3] : "未偵測到具體地點";

        // 4. 提取主旨/內容 (尋找「」或前 30 字核心)
        const titleMatch = text.match(/「(.+?)」/);
        const title = titleMatch ? titleMatch[1] : text.substring(0, 20) + "...";

        // 5. 行動摘要
        let action = "閱覽詳細信件內容";
        if (text.includes("附件")) action = "需查閱附件檔案";
        if (text.includes("回覆") || text.includes("報名")) action = "需於期限內回覆或報名";
        if (isUrgent) action = "💡 請優先處理此事項";

        // --- AI 邏輯結束 ---

        // 建立新卡片
        const list = document.getElementById('analysis-list');
        const newItem = document.createElement('div');
        newItem.className = 'email-item';
        
        newItem.innerHTML = `
            <div class="urgency-tag ${isUrgent ? 'tag-urgent' : 'tag-normal'}">
                ${isUrgent ? 'URGENT' : 'NORMAL'}
            </div>
            <div class="info-row">
                <b>📌 主旨內容</b>
                <span>${title}</span>
            </div>
            <div class="info-row">
                <b>⏰ 關鍵時間</b>
                <span>${time}</span>
            </div>
            <div class="info-row">
                <b>📍 地點資訊</b>
                <span>${location}</span>
            </div>
            <div class="info-row">
                <b>🚀 AI 建議行動</b>
                <span>${action}</span>
            </div>
        `;

        // 插入到最前面
        list.insertBefore(newItem, list.firstChild);

        // 清空輸入框
        document.getElementById('emailInput').value = '';
        
        // 觸發震動
        if (navigator.vibrate) navigator.vibrate(isUrgent ? [100, 50, 100] : [50]);
    }
</script>
</body>
</html>
