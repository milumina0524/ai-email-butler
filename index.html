<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samsung Galaxy AI | Mail Butler Pro</title>
    <style>
        :root {
            --samsung-blue: #1428a0;
            --accent-cyan: #38bdf8;
            --bg: #000;
            --card-bg: rgba(30, 30, 35, 0.8);
            --border: rgba(255, 255, 255, 0.12);
        }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1e3a8a 0%, #000 80%);
            color: #fff;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            margin: 0; padding: 24px; display: flex; justify-content: center; min-height: 100vh;
        }

        .app-container { width: 100%; max-width: 500px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo { font-weight: 800; font-size: 20px; letter-spacing: -0.5px; background: linear-gradient(90deg, #fff, var(--accent-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .badge { font-size: 10px; background: rgba(56, 189, 248, 0.15); color: var(--accent-cyan); padding: 5px 12px; border-radius: 20px; font-weight: 800; }

        /* Input Area */
        .input-card { background: var(--card-bg); backdrop-filter: blur(25px); border: 1px solid var(--border); border-radius: 28px; padding: 24px; margin-bottom: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        textarea { width: 100%; height: 140px; background: transparent; border: none; color: #fff; font-size: 16px; line-height: 1.6; outline: none; resize: none; margin-bottom: 10px; }
        
        button {
            width: 100%; padding: 18px; background: #fff; color: #000; border: none; border-radius: 50px; 
            font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.3s cubic-bezier(0.2, 1, 0.3, 1);
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        button:active { transform: scale(0.96); }

        /* Results List */
        #analysis-list { margin-top: 30px; }
        .email-card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 30px; padding: 28px; margin-bottom: 24px;
            backdrop-filter: blur(40px); animation: slideUp 0.6s ease; position: relative;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        .prio { position: absolute; top: 25px; right: 28px; font-size: 10px; font-weight: 900; padding: 5px 14px; border-radius: 20px; }
        .urgent { background: #ff453a; color: #fff; box-shadow: 0 0 15px rgba(255, 69, 58, 0.4); }
        .normal { background: rgba(255,255,255,0.1); color: #fff; }

        .row { margin-bottom: 22px; }
        .row:last-child { margin-bottom: 0; }
        .label { font-size: 11px; color: var(--accent-cyan); font-weight: 800; letter-spacing: 1.2px; margin-bottom: 8px; display: block; text-transform: uppercase; }
        .content { font-size: 16px; color: #f1f5f9; font-weight: 500; line-height: 1.6; }
        
        .empty { text-align: center; color: #444; margin-top: 60px; font-size: 14px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="logo">GALAXY AI BUTLER</div>
        <div class="badge">INTELLIGENT V4.5</div>
    </div>

    <div class="input-card">
        <textarea id="emailInput" placeholder="請在此貼入郵件本文內容..."></textarea>
        <button onclick="smartAnalyze()">
            <span>分析此郵件</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
        </button>
    </div>

    <div id="analysis-list">
        <div class="empty">等待輸入郵件內容...</div>
    </div>
</div>

<script>
    function smartAnalyze() {
        const text = document.getElementById('emailInput').value.trim();
        if (!text) return;

        document.querySelector('.empty').style.display = 'none';

        // --- AI 智慧擷取引擎 ---

        // 1. 緊急度 (Keywords)
        const isUrgent = /緊急|變更|取消|截止|立刻|馬上|修改|重要通知|複試|面試/.test(text);

        // 2. 深度摘要邏輯 (重組為完整長句)
        const titleMatch = text.match(/「(.+?)」/);
        const eventTitle = titleMatch ? titleMatch[1] : "該項活動";
        
        // 過濾垃圾詞彙，並擷取主幹
        let cleanBody = text.replace(/春暖花開|誠摯邀請|正式揭開序幕|共襄盛舉|沉浸於|創意與熱情交織的|正式揭開序幕/g, "").trim();
        let mainContent = cleanBody.split(/[。！]/).find(s => s.length > 10) || "相關活動細節";
        
        // 組合成「長摘要」
        const longSummary = `這封郵件主要通知有關【${eventTitle}】的相關事宜。內容重點在於：${mainContent}，建議收件者留意相關安排。`;

        // 3. 時間與地點 (動態過濾)
        const timeMatch = text.match(/(\d{1,2}月\d{1,2}日|\d{1,2}:\d{2}|下週.|明天|下午.點|上午.點)/g);
        const timeResult = timeMatch ? Array.from(new Set(timeMatch)).join('、') : null;

        const locMatch = text.match(/(在|於|地點:|地點在)(.+?)(大樓|廳|室|館|校區|飯店|辦公室|廣場|大廳|禮堂)/);
        const locResult = locMatch ? locMatch[2] + locMatch[3] : null;

        // 4. 行動指南
        let action = "建議查閱全文了解細節。";
        if (text.includes("附件")) action = "💡 系統偵測到附件，請務必下載查看詳細說明。";
        if (text.includes("回覆") || text.includes("報名")) action = "⚠️ 請注意，此事項需於期限內完成回覆或報名手續。";
        if (isUrgent) action = "🚨 偵測到重大變更或緊急事項，請優先處理。";

        // --- 渲染 UI ---

        const list = document.getElementById('analysis-list');
        const card = document.createElement('div');
        card.className = 'email-card';

        let rowsHtml = `
            <div class="row">
                <span class="label">AI 深度摘要</span>
                <span class="content">${longSummary}</span>
            </div>
        `;

        if (timeResult) {
            rowsHtml += `<div class="row"><span class="label">時程安排</span><span class="content">${timeResult}</span></div>`;
        }

        if (locResult) {
            rowsHtml += `<div class="row"><span class="label">活動地點</span><span class="content">${locResult}</span></div>`;
        }

        rowsHtml += `
            <div class="row">
                <span class="label">建議行動</span>
                <span class="content">${action}</span>
            </div>
        `;

        card.innerHTML = `
            <div class="prio ${isUrgent ? 'urgent' : 'normal'}">${isUrgent ? 'URGENT' : 'INFO'}</div>
            ${rowsHtml}
        `;

        list.insertBefore(card, list.firstChild);
        document.getElementById('emailInput').value = '';
        if (navigator.vibrate) navigator.vibrate(isUrgent ? [100, 50, 100] : [40]);
    }
</script>
</body>
</html>
