<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mail Butler | Structured Summary</title>
    <style>
        :root { --samsung-blue: #1428a0; --bg: #000; --card: #1c1c1e; --accent: #38bdf8; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; padding: 20px; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; }
        .header { border-bottom: 2px solid var(--samsung-blue); padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        textarea { width: 100%; height: 160px; background: #2c2c2e; color: #fff; border: 1px solid #3a3a3c; border-radius: 12px; padding: 12px; box-sizing: border-box; font-size: 15px; margin-bottom: 15px; line-height: 1.5; }
        button { width: 100%; padding: 15px; background: var(--samsung-blue); color: white; border: none; border-radius: 50px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(20,40,160,0.4); }
        button:active { transform: scale(0.98); }
        #result { margin-top: 25px; display: none; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .status-badge { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 11px; margin-bottom: 15px; font-weight: bold; text-transform: uppercase; }
        .urgent { background: rgba(255, 69, 58, 0.2); color: #ff453a; border: 1px solid #ff453a; }
        .normal { background: rgba(50, 215, 75, 0.2); color: #32d74b; border: 1px solid #32d74b; }
        .summary-card { background: var(--card); padding: 20px; border-radius: 16px; border-left: 5px solid var(--accent); }
        .summary-item { margin-bottom: 12px; font-size: 15px; line-height: 1.6; }
        .summary-item b { color: var(--accent); display: block; font-size: 12px; margin-bottom: 2px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2 style="margin:0">萬能郵件管家</h2>
        <span style="font-size:10px; opacity:0.6;">AI ENGINE v3.0</span>
    </div>
    <textarea id="input" placeholder="貼入郵件本文..."></textarea>
    <button onclick="analyze()">AI 智慧重點擷取</button>
    <div id="result">
        <div id="badge" class="status-badge"></div>
        <div class="summary-card" id="summary-content">
            </div>
    </div>
</div>

<script>
    // 預設填入妳提供的範例
    document.getElementById('input').value = "春暖花開，陽明交大「2026春夏藝術季」正式揭開序幕！誠摯邀請您共襄盛舉，沉浸於創意與熱情交織的藝術饗宴。本屆包含多場國際音樂會與現代舞團演出，詳情請見附件說明。";

    function analyze() {
        const text = document.getElementById('input').value;
        if (!text) return;

        // 1. 偵測緊急程度
        const isUrgent = /緊急|變更|取消|截止|注意|立刻/.test(text);
        const badge = document.getElementById('badge');
        badge.innerText = isUrgent ? "Priority: High" : "Priority: Normal";
        badge.className = isUrgent ? "status-badge urgent" : "status-badge normal";

        // 2. 結構化擷取邏輯 (模擬 AI 實體辨識)
        const eventName = text.match(/「(.+?)」/)?.[1] || "活動通知";
        const content = text.match(/包含(.+?)演出|包含(.+?)。/)?.[0] || "請參閱內文詳細內容。";
        const action = text.includes("附件") ? "請查閱郵件附件說明" : "請回覆郵件確認";

        // 3. 渲染結構化摘要
        const summaryBox = document.getElementById('summary-content');
        summaryBox.innerHTML = `
            <div class="summary-item"><b>📌 活動主旨</b>${eventName}</div>
            <div class="summary-item"><b>🏛️ 地點/單位</b>陽明交大</div>
            <div class="summary-item"><b>✨ 內容亮點</b>${content.replace("包含", "").replace("。", "")}</div>
            <div class="summary-item"><b>ℹ️ 行動指南</b>${action}</div>
        `;

        document.getElementById('result').style.display = 'block';
        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
    }
</script>
</body>
</html>
