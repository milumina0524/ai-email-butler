<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>萬能郵件管家 | Universal AI Butler</title>
    <style>
        :root { --accent: #38bdf8; --bg: #000; --card: rgba(30, 30, 35, 0.9); }
        body { background: var(--bg); background-image: radial-gradient(circle at 50% -20%, #1e3a8a 0%, #000 85%); color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .app { width: 100%; max-width: 480px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo { font-weight: 900; font-size: 24px; letter-spacing: -1px; }
        .ai-chip { font-size: 10px; background: rgba(56, 189, 248, 0.15); color: var(--accent); padding: 4px 12px; border-radius: 20px; font-weight: 800; border: 1px solid rgba(56, 189, 248, 0.3); }
        .input-card { background: var(--card); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; padding: 24px; margin-bottom: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
        textarea { width: 100%; height: 130px; background: transparent; border: none; color: #fff; font-size: 16px; line-height: 1.6; outline: none; resize: none; margin-bottom: 15px; }
        button { width: 100%; padding: 18px; background: #fff; color: #000; border: none; border-radius: 50px; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; justify-content: center; align-items: center; gap: 10px; }
        button:active { transform: scale(0.95); }
        .result-card { background: var(--card); border: 1px solid rgba(255,255,255,0.12); border-radius: 32px; padding: 30px; margin-bottom: 24px; animation: slideUp 0.6s ease forwards; position: relative; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        .prio { position: absolute; top: 25px; right: 30px; font-size: 10px; font-weight: 900; padding: 5px 14px; border-radius: 20px; }
        .urgent { background: #ff453a; color: #fff; box-shadow: 0 0 15px rgba(255, 69, 58, 0.4); }
        .normal { background: rgba(255,255,255,0.1); color: #fff; }
        .row { margin-bottom: 20px; }
        .label { font-size: 11px; color: var(--accent); font-weight: 800; letter-spacing: 1.5px; margin-bottom: 6px; display: block; text-transform: uppercase; }
        .content { font-size: 16px; color: #f1f5f9; font-weight: 500; line-height: 1.7; }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="logo">萬能郵件管家</div>
        <div class="ai-chip">UNIVERSAL AI ENGINE</div>
    </div>
    <div class="input-card">
        <textarea id="emailInput" placeholder="在此輸入或貼入郵件本文..."></textarea>
        <button onclick="smartAnalyze()">
            <span>啟動智慧分析</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
        </button>
    </div>
    <div id="results"></div>
</div>

<script>
    function smartAnalyze() {
        const text = document.getElementById('emailInput').value.trim();
        if (!text) return;

        // 1. 偵測緊急程度
        const isUrgent = /緊急|變更|取消|截止|立刻|複試|考題|面試|重要通知|注意/.test(text);

        // 2. 智慧結構化摘要 (iPhone 優化版)
        const titleMatch = text.match(/「(.+?)」/);
        const subject = titleMatch ? `【${titleMatch[1]}】` : "郵件事項";
        
        let bodySnippet = text.replace(/春暖花開|誠摯邀請|正式揭開序幕|共襄盛舉|沉浸於|創意與熱情交織的/g, "").trim();
        let keyPoint = bodySnippet.split(/[。！\n]/).find(s => s.length > 10) || "活動相關細節";
        
        const summary = `本封郵件主要通知有關${subject}的具體安排。重點摘要如下：${keyPoint}。請收件人依照此資訊進行準備。`;

        // 3. 關鍵資訊偵測 (時間/地點)
        const timeMatch = text.match(/(\d{1,2}月\d{1,2}日|\d{1,2}:\d{2}|下週.|明天|下午.點|上午.點)/g);
        const timeVal = timeMatch ? Array.from(new Set(timeMatch)).join('、') : null;

        const locMatch = text.match(/(在|於|地點:|地點在)(.+?)(大樓|廳|室|館|校區|宿舍|研究室|大廳|廣場)/);
        const locVal = locMatch ? locMatch[2] + locMatch[3] : null;

        // 4. 行動指南
        let action = "建議閱覽全文以獲取完整資訊。";
        if (text.includes("附件")) action = "💡 偵測到附件，請務必查閱詳細文件內容。";
        if (text.includes("回覆") || text.includes("報名")) action = "⚠️ 需在期限內完成回覆或報名手續。";
        if (isUrgent) action = "🚨 偵測到重大變更，請立即優先處理。";

        // --- 渲染 UI ---
        const results = document.getElementById('results');
        const card = document.createElement('div');
        card.className = 'result-card';

        let rows = `<div class="row"><span class="label">AI 智慧摘要</span><span class="content">${summary}</span></div>`;
        if (timeVal) rows += `<div class="row"><span class="label">關鍵時間點</span><span class="content">${timeVal}</span></div>`;
        if (locVal) rows += `<div class="row"><span class="label">活動地點</span><span class="content">${locVal}</span></div>`;
        rows += `<div class="row"><span class="label">建議行動指南</span><span class="content">${action}</span></div>`;

        card.innerHTML = `<div class="prio ${isUrgent ? 'urgent' : 'normal'}">${isUrgent ? 'URGENT' : 'INFO'}</div>${rows}`;
        results.insertBefore(card, results.firstChild);
        document.getElementById('emailInput').value = '';
        if (navigator.vibrate) navigator.vibrate(isUrgent ? [80, 40, 80] : [40]);
    }
</script>
</body>
</html>        <button onclick="smartProcess()">
            <span>啟動 Galaxy AI 分析</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
        </button>
    </div>

    <div id="loader">✨ 正在使用裝置內建 AI 進行深度摘要...</div>
    <div id="results"></div>
</div>

<script>
    async function smartProcess() {
        const text = document.getElementById('emailInput').value.trim();
        if (!text) return;

        const loader = document.getElementById('loader');
        const results = document.getElementById('results');
        loader.style.display = 'block';

        let summary, time = null, loc = null, isUrgent = false;

        // --- 真正的 AI 邏輯開始 ---
        try {
            // 嘗試呼叫瀏覽器內建的 Gemini Nano
            if (window.ai && window.ai.createTextSession) {
                const session = await window.ai.createTextSession();
                const prompt = `請分析這封郵件並以繁體中文回答。摘要要自然且詳盡(約60字)，找出時間與地點(若無則回傳"無")。內容：${text}`;
                const rawResponse = await session.prompt(prompt);
                
                // 解析 AI 回傳 (簡單模擬 AI 解析)
                summary = rawResponse; 
                isUrgent = /緊急|變更|取消|立刻/.test(text);
            } else {
                // 備援：高品質 Regex 模擬 AI 邏輯
                throw new Error("No Built-in AI");
            }
        } catch (e) {
            // 備援邏輯：智慧過濾重組
            document.getElementById('ai-status').innerText = "SMART LOGIC MODE";
            isUrgent = /緊急|變更|取消|立刻|截止/.test(text);
            const title = text.match(/「(.+?)」/)?.[1] || "郵件通知";
            const main = text.split(/[。！]/).find(s => s.length > 10) || "活動內容";
            summary = `關於【${title}】的事項，重點在於${main.substring(0, 80)}。請收件者留意並做好準備。`;
        }
        // --- 真正的 AI 邏輯結束 ---

        // 提取時間與地點 (通用邏輯)
        const timeMatch = text.match(/(\d{1,2}月\d{1,2}日|\d{1,2}:\d{2}|下週.|明天|下午.點)/g);
        time = timeMatch ? [...new Set(timeMatch)].join('、') : null;
        const locMatch = text.match(/(在|於|地點:|地點在)(.+?)(大樓|廳|室|館|校區|宿舍|研究室)/);
        loc = locMatch ? locMatch[2] + locMatch[3] : null;

        // 渲染 UI
        loader.style.display = 'none';
        const card = document.createElement('div');
        card.className = 'result-card';
        
        let html = `
            <div class="prio ${isUrgent ? 'urgent' : 'normal'}">${isUrgent ? 'URGENT' : 'INFO'}</div>
            <div class="row"><span class="label">AI 智慧摘要</span><span class="content">${summary}</span></div>
        `;
        if (time) html += `<div class="row"><span class="label">關鍵時間</span><span class="content">${time}</span></div>`;
        if (loc) html += `<div class="row"><span class="label">活動地點</span><span class="content">${loc}</span></div>`;
        
        card.innerHTML = html;
        results.insertBefore(card, results.firstChild);
        document.getElementById('emailInput').value = '';
    }
</script>
</body>
</html>
